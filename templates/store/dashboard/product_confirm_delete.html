{% extends 'store/dashboard/base.html' %}

{% block dashboard_content %}
<h2>Delete Product</h2>
<p class="mt-20">Are you sure you want to delete <strong>{{ product.name }}</strong>? This action cannot be undone.</p>

<form method="POST" class="mt-40">
    {% csrf_token %}
    <button type="submit" class="btn" style="background-color: #e74c3c;">Yes, Delete</button>
    <a href="{% url 'dashboard_products' %}" class="btn-cancel">Cancel</a>
</form>

<style>
.mt-40 { margin-top: 40px; }
</style>
{% endblock %}
