{% extends 'store/base.html' %}

{% block content %}
<section class="container dashboard-container">
    <aside class="dashboard-sidebar">
        <div class="sidebar-header">
            <h3>Dashboard</h3>
            <p>{{ user.username }}</p>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'dashboard_home' %}" class="{% if request.resolver_match.url_name == 'dashboard_home' %}active{% endif %}">Overview</a>
            <a href="{% url 'dashboard_products' %}" class="{% if 'product' in request.resolver_match.url_name %}active{% endif %}">Inventory</a>
            <a href="{% url 'dashboard_orders' %}" class="{% if request.resolver_match.url_name == 'dashboard_orders' %}active{% endif %}">Orders</a>
            <hr>
            <a href="{% url 'owner_logout' %}">Logout</a>
        </nav>
    </aside>

    <main class="dashboard-main">
        {% block dashboard_content %}{% endblock %}
    </main>
</section>
{% endblock %}

{% block extra_css %}
<style>
.dashboard-container {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 40px;
    padding-top: 40px;
    padding-bottom: 80px;
}

.dashboard-sidebar {
    background: var(--lavender-bg);
    border-radius: 8px;
    padding: 30px;
    height: fit-content;
}

.sidebar-header {
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(106, 13, 173, 0.1);
}

.sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.sidebar-nav a {
    padding: 10px 15px;
    border-radius: 4px;
    font-weight: 500;
}

.sidebar-nav a:hover, .sidebar-nav a.active {
    background: var(--primary-violet);
    color: var(--white);
}

.dashboard-main {
    background: var(--white);
}

.dashboard-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.stat-card {
    background: var(--white);
    padding: 30px;
    border-radius: 8px;
    border: 1px solid var(--lavender-bg);
    text-align: center;
}

.stat-card h4 {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 10px;
}

.stat-card span {
    font-size: 2rem;
    font-weight: 700;
    color: var(--primary-violet);
}

.dashboard-table-container {
    background: var(--white);
    border: 1px solid var(--lavender-bg);
    border-radius: 8px;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 15px 20px;
    text-align: left;
    border-bottom: 1px solid var(--lavender-bg);
}

th {
    background: var(--lavender-bg);
    font-size: 0.9rem;
    text-transform: uppercase;
    color: var(--text-muted);
}

.actions {
    display: flex;
    gap: 10px;
}

.action-edit { color: #3498db; }
.action-delete { color: #e74c3c; }

@media (max-width: 900px) {
    .dashboard-container {
        grid-template-columns: 1fr;
    }
}
</style>
{% endblock %}
